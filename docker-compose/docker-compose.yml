version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gpn_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: >
      sh -c "alembic upgrade head && 
             gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend_app.main:app -b 0.0.0.0:8000"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    env_file: .env
    command: ["celery", "-A", "backend_app.celery_worker", "worker", "--loglevel=info"]
    depends_on:
      - redis
      - backend

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    restart: always
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  gpn_db_data: