[alembic]
# path to migration scripts
script_location = alembic

# The sqlalchemy.url variable is read from the .env file by the env.py script
# sqlalchemy.url = postgresql://user:password@host/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic